<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartVMS - Admin Login</title>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-gradient: radial-gradient(circle at top right, #0d2c18 0%, #060e0a 50%, #030403 100%);
            --accent: #2ecc71;
            --accent-glow: rgba(46, 204, 113, 0.35);
            --card-bg: rgba(16, 28, 20, 0.45);
            --card-border: rgba(46, 204, 113, 0.15);
            --text-light: #ffffff;
            --text-dim: #9aa8a0;
            --danger: #ff4757;
            --danger-glow: rgba(255, 71, 87, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* Abstract glowing particles in background */
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        .glow-sphere-1 { top: 10%; left: 10%; }
        .glow-sphere-2 { bottom: 10%; right: 10%; }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 50px rgba(46, 204, 113, 0.05);
            z-index: 1;
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 16, 12, 0.8);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(10, 16, 12, 0.95);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #05140b;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.25);
        }

        .btn-login:hover {
            background: #27ae60;
            box-shadow: 0 6px 25px rgba(46, 204, 113, 0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        /* Flash Error Message Styling */
        .alert {
            background: var(--danger-glow);
            border: 1px solid var(--danger);
            color: #ff6b81;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .alert-icon {
            font-weight: bold;
            font-size: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Glowing visual background spheres -->
    <div class="glow-sphere glow-sphere-1"></div>
    <div class="glow-sphere glow-sphere-2"></div>

    <div class="login-container">
        <div class="header">
            <div class="logo">
                <span>✦</span> SmartVMS
            </div>
            <div class="subtitle">Operator Web Administration Portal</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">
                        <span class="alert-icon">⚠️</span>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="operator_name">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-login">Access Portal</button>
        </form>

        <div class="footer">
            SmartVMS Admin Console &copy; 2026. All rights reserved.
        </div>
    </div>

</body>
</html>
