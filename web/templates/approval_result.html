<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - SmartVMS</title>
    <style>
        :root {
            --bg-dark: #121214;
            --card-bg: rgba(30, 30, 42, 0.75);
            --border-color: #2d2d3f;
            {% if status == 'approved' %}
            --accent: #2ecc71;
            --accent-glow: rgba(46, 204, 113, 0.2);
            {% elif status == 'rejected' %}
            --accent: #ff4757;
            --accent-glow: rgba(255, 71, 87, 0.2);
            {% else %}
            --accent: #3498db;
            --accent-glow: rgba(52, 152, 219, 0.2);
            {% endif %}
            --text-light: #ffffff;
            --text-dim: #8b8b9b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-glow);
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-light);
        }

        p.visitor {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 16px;
        }

        p.message {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .footer {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            {% if status == 'approved' %}
            ✓
            {% elif status == 'rejected' %}
            ✗
            {% else %}
            ℹ
            {% endif %}
        </div>
        <h1>{{ title }}</h1>
        <p class="visitor">{{ visitor_name }}</p>
        <p class="message">{{ message }}</p>
        
        <div class="footer">
            SmartVMS — Secure Visitor Management System
        </div>
    </div>
</body>
</html>
