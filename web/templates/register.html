<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartVMS - Self Registration</title>
    <style>
        :root {
            --bg-dark: #121214;
            --sidebar-bg: #1a1a24;
            --accent: #2ecc71;
            --text-light: #ffffff;
            --text-dim: #8b8b9b;
            --card-bg: rgba(32, 32, 46, 0.7);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Fake Sidebar */
        .sidebar {
            width: 230px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #2d2d3f;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid #2d2d3f;
        }

        .nav-items {
            padding: 10px 0;
            flex-grow: 1;
        }

        .nav-item {
            padding: 15px 20px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: bold;
            position: relative;
        }

        .nav-item:not(.active):hover {
            background-color: #2d2d3f;
        }

        .nav-item.active {
            color: var(--text-light);
            background-color: rgba(46, 204, 113, 0.1);
            border-left: 4px solid var(--accent);
        }

        .nav-item.locked::after {
            content: '🔒';
            position: absolute;
            right: 20px;
            font-size: 12px;
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #2d2d3f;
            border-radius: 12px;
            padding: 25px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 { color: var(--accent); margin-bottom: 5px; }
        p.subtitle { color: var(--text-dim); margin-bottom: 25px; font-size: 14px; }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #1a1a24;
            border: 1px solid #2d2d3f;
            border-radius: 8px;
            color: white;
            font-size: 15px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: #121214;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button.submit-btn:active {
            transform: scale(0.98);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                flex-direction: row; 
                height: 60px; 
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid #2d2d3f;
            }
            .sidebar-header { display: none; }
            .nav-items { display: flex; padding: 0; }
            .nav-item { padding: 0 15px; white-space: nowrap; border-left: none !important; border-bottom: 4px solid transparent; }
            .nav-item.active { border-bottom: 4px solid var(--accent); background: none; }
            .nav-item.locked::after { position: static; margin-left: 5px; }
        }

        /* Success Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        .overlay h1 { color: var(--accent); font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Fake Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">SmartVMS</div>
        <div class="nav-items">
            <div class="nav-item locked" onclick="showLocked()">Dashboard</div>
            <div class="nav-item active">Visitor Check-In</div>
            <div class="nav-item locked" onclick="showLocked()">Approvals</div>
            <div class="nav-item locked" onclick="showLocked()">Employees</div>
            <div class="nav-item locked" onclick="showLocked()">Visitor History</div>
            <div class="nav-item locked" onclick="showLocked()">Settings</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="card">
            <h2>Self Registration</h2>
            <p class="subtitle">Please enter your details to notify your host.</p>

            <form id="regForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="visitor_name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label>Mobile Number *</label>
                    <input type="tel" name="mobile" required placeholder="+1 234 567 8900">
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" required placeholder="visitor@example.com">
                </div>

                <div class="form-group">
                    <label>Company (Optional)</label>
                    <input type="text" name="company" placeholder="Your Company Ltd.">
                </div>

                <div class="form-group">
                    <label>Who are you visiting? *</label>
                    <select name="host_id" required>
                        <option value="">Select a Host...</option>
                        {% for host in hosts %}
                        <option value="{{ host.id }}">{{ host.name }} - {{ host.department_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Hidden Dept ID (Simplified for kiosk) -->
                <input type="hidden" name="dept_id" id="hidden_dept" value="">

                <div class="form-group">
                    <label>Purpose of Visit *</label>
                    <textarea name="purpose" rows="3" required placeholder="E.g., Meeting, Interview, Delivery..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Check In</button>
            </form>
        </div>
    </div>

    <!-- Success Screen -->
    <div class="overlay" id="successOverlay">
        <h1>✅ Done!</h1>
        <p style="font-size: 18px; color: white;">Your host has been notified.</p>
        <p style="font-size: 14px; color: #8b8b9b; margin-top: 10px;">Please take a seat in the waiting area.</p>
    </div>

    <script>
        // Update hidden department based on host selection
        document.querySelector('select[name="host_id"]').addEventListener('change', function(e) {
            // In a real app we'd map this, for now we let backend handle it or default it
            document.getElementById('hidden_dept').value = "1"; // Fallback
        });

        function showLocked() {
            alert("🔒 Access Denied. This section is restricted to administrative staff only.");
        }

        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('regForm');
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = new FormData(form);
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    document.getElementById('successOverlay').style.display = 'flex';
                    // Reset after 5 seconds for next visitor
                    setTimeout(() => {
                        window.location.reload();
                    }, 5000);
                } else {
                    alert("Error: " + result.message);
                    btn.innerText = "Check In";
                    btn.disabled = false;
                }
            } catch(e) {
                alert("Network error. Please try again.");
                btn.innerText = "Check In";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
